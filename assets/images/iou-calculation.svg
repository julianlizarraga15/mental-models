<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 960" role="img" aria-labelledby="title desc">
  <title id="title">Bounding Boxes with IoU Scores</title>
  <desc id="desc">A raccoon photo-style illustration with green ground truth, blue true-positive prediction, and red false-positive prediction bounding boxes annotated with IoU scores.</desc>
  <defs>
    <linearGradient id="deck" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#d7d7d7"/>
      <stop offset="1" stop-color="#988f85"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#e7e2d4"/>
      <stop offset=".45" stop-color="#6e6b63"/>
      <stop offset="1" stop-color="#2e2c29"/>
    </linearGradient>
    <filter id="softBlur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="7" stdDeviation="7" flood-color="#000" flood-opacity=".35"/></filter>
  </defs>

  <rect width="900" height="960" fill="#fff"/>
  <text x="450" y="28" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="26" fill="#252525">Bounding Boxes with IoU Scores</text>

  <g transform="translate(20 36)">
    <rect width="860" height="880" fill="#5d674a"/>
    <g filter="url(#softBlur)">
      <rect width="860" height="430" fill="#45513b"/>
      <rect x="145" y="0" width="715" height="85" fill="#d9e8f0" opacity=".65" transform="skewY(-10)"/>
      <rect x="0" y="430" width="860" height="450" fill="url(#deck)"/>
      <rect x="0" y="420" width="860" height="24" fill="#c7c0b8"/>
      <g stroke="#30382c" stroke-width="8" opacity=".55">
        <path d="M25 0v430M70 0v430M115 0v430M160 0v430M205 0v430M250 0v430M295 0v430M340 0v430M385 0v430M430 0v430M475 0v430M520 0v430M565 0v430M610 0v430M655 0v430M700 0v430M745 0v430M790 0v430M835 0v430"/>
      </g>
      <rect x="98" y="0" width="42" height="565" fill="#a5a2a0" opacity=".8"/>
      <rect x="0" y="580" width="120" height="300" fill="#4d594b"/>
      <g fill="#65b15e" opacity=".85">
        <ellipse cx="28" cy="275" rx="54" ry="12" transform="rotate(20 28 275)"/>
        <ellipse cx="825" cy="270" rx="22" ry="72" transform="rotate(26 825 270)"/>
        <ellipse cx="56" cy="565" rx="19" ry="62" transform="rotate(-55 56 565)"/>
      </g>
    </g>

    <g transform="translate(276 300)" filter="url(#shadow)">
      <path d="M90 310c-62-8-100 35-111 105-9 57 15 88 66 88 69 0 117-74 105-139-5-28-24-49-60-54z" fill="#3b332d"/>
      <path d="M170 160c-88 0-151 70-151 181 0 142 65 249 159 249 88 0 154-100 154-238 0-115-63-192-162-192z" fill="url(#fur)"/>
      <path d="M90 78c-52 18-86 65-82 122 8 95 84 138 168 136 94-2 160-59 156-145-3-72-58-116-125-123-15-2-37 7-52 20-20-12-43-17-65-10z" fill="#d6d3c9"/>
      <path d="M70 87 92 22l52 62M215 80l48-57 10 76" fill="#20201f"/>
      <path d="M36 170c54-44 103-51 148-11 41-39 90-32 136 8-35 49-78 70-132 42-51 29-103 14-152-39z" fill="#1f2023"/>
      <ellipse cx="113" cy="163" rx="11" ry="8" fill="#111"/>
      <ellipse cx="225" cy="162" rx="11" ry="8" fill="#111"/>
      <path d="M153 191c20 14 39 14 58 0-8 24-47 26-58 0z" fill="#242424"/>
      <ellipse cx="181" cy="185" rx="18" ry="11" fill="#141414"/>
      <path d="M19 337c-46 57-49 150-22 227 18 51 62 39 70-16 8-52 26-136 65-183z" fill="#292521"/>
      <path d="M323 352c45 35 59 75 76 102" stroke="#282828" stroke-width="18" stroke-linecap="round" fill="none"/>
      <path d="M126 348c-5 83 5 169 21 248M237 340c10 74 7 166-12 257" stroke="#4a4640" stroke-width="45" stroke-linecap="round"/>
    </g>

    <rect x="236" y="293" width="455" height="585" fill="none" stroke="#118b28" stroke-width="4"/>
    <rect x="240" y="298" width="410" height="548" fill="none" stroke="#001eff" stroke-width="4"/>
    <rect x="348" y="215" width="455" height="570" fill="none" stroke="#ff1616" stroke-width="4"/>

    <text x="242" y="286" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#001eff">IoU: 0.85</text>
    <text x="348" y="200" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#ff1616">IoU: 0.48</text>

    <g transform="translate(620 12)" font-family="Arial, Helvetica, sans-serif" font-size="22">
      <rect width="220" height="84" rx="4" fill="#fff" opacity=".9"/>
      <rect x="12" y="14" width="38" height="16" fill="none" stroke="#118b28" stroke-width="4"/><text x="60" y="30" fill="#333">Ground Truth</text>
      <rect x="12" y="39" width="38" height="16" fill="none" stroke="#001eff" stroke-width="4"/><text x="60" y="55" fill="#333">Prediction 1 - TP</text>
      <rect x="12" y="64" width="38" height="16" fill="none" stroke="#ff1616" stroke-width="4"/><text x="60" y="80" fill="#333">Prediction 2 - FP</text>
    </g>
  </g>

  <text x="450" y="950" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-style="italic" fill="#6b7280">IoU Calculation</text>
</svg>
